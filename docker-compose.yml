services:
  db:
    image: postgres:16
    container_name: archive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: archive
      POSTGRES_PASSWORD: archive_password
      POSTGRES_DB: archive_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: archive-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: archive_minio
      MINIO_ROOT_PASSWORD: archive_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  pgdata:
  minio_data: